services:
# El hosting de dev/prod corre MariaDB 10.6 — se replica el mismo motor en local.
  mysql:
    image: mariadb:10.6
    container_name: refaccionaria-mysql
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-refaccionaria_local}
      MARIADB_USER: ${DB_USERNAME:-refaccionaria}
      MARIADB_PASSWORD: ${DB_PASSWORD:-refaccionaria}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - '${DB_PORT:-3307}:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 5s
      timeout: 5s
      retries: 10

  # BD efímera (tmpfs) para la suite de tests: rápida y desechable.
  mysql-testing:
    image: mariadb:10.6
    container_name: refaccionaria-mysql-testing
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: refaccionaria_testing
      MARIADB_USER: refaccionaria
      MARIADB_PASSWORD: refaccionaria
      MARIADB_ROOT_PASSWORD: root
    ports:
      - '3308:3306'
    tmpfs:
      - /var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
